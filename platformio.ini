; ============================================================
; Cấu hình PlatformIO - Hệ thống tưới tiêu thông minh ESP32
; ============================================================
; Board: ESP32 DOIT DevKit V1 (CP2102)
; Framework: Arduino
; ============================================================

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

; --- Thư viện phụ thuộc ---
lib_deps =
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4        ; LCD I2C 16x2
    adafruit/DHT sensor library @ ^1.4.6             ; Cảm biến DHT11
    adafruit/Adafruit Unified Sensor @ ^1.1.14       ; Thư viện sensor chung Adafruit
    adafruit/RTClib @ ^2.1.4                         ; Module RTC DS1307
    me-no-dev/AsyncTCP @ ^1.1.1                      ; Async TCP cho ESP32
    me-no-dev/ESP Async WebServer @ ^1.2.3           ; Web server bất đồng bộ
    bblanchon/ArduinoJson @ ^7.3.1                   ; Xử lý JSON cho web API

; --- Tốc độ Serial Monitor ---
monitor_speed = 115200

; --- Cờ biên dịch ---
build_flags =
    -DCORE_DEBUG_LEVEL=3                             ; Bật debug log ESP32
    -DARDUINOJSON_ENABLE_PROGMEM=1                   ; ArduinoJson hỗ trợ PROGMEM